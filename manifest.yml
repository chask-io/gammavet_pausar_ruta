function:
  name: PausarRutaFn
  runtime: python3.12
  handler: handler.lambda_handler
  description: |
    Pausa la ruta o sesion de un conductor de Gammavet cuando el conductor pide
    una pausa, almuerzo o descanso. Usar solo para pausar; no inicia, completa,
    rechaza ni reanuda paradas.
  timeout: 120
  memory_size: 256
  layers:
    - foundationMinimal
    - foundationApi

  parameters:
    required: []
    optional:
      - name: driver_id
        type: string
        description: ID del conductor si esta disponible.
      - name: driver_phone
        type: string
        description: Telefono WhatsApp del conductor si esta disponible.
      - name: nota
        type: string
        description: Motivo opcional de la pausa.
      - name: ticket_id
        type: string
        description: ID opcional de ticket o sesion para correlacion.

  widget:
    enabled: false
    type: dynamic_widget
    params: []

  testing:
    handles_files: false
    produces_files: false

  data:
    reads:
      - table: gammavet_test.drivers
        columns: [id, external_driver_id, full_name, phone, normalized_phone, availability, assigned_zone, street, street_number, unit, region, comuna, paused, active, source_spreadsheet_id, source_sheet_row, created_at, updated_at]
      - table: gammavet_test.dispatch_events
        columns: [id, event_type, actor_lambda, orchestration_event_uuid]
    writes:
      - table: gammavet_test.drivers
        mode: update
        columns: [paused, updated_at]
      - table: gammavet_test.dispatch_events
        mode: insert
        columns: [event_type, actor_lambda, driver_id, orchestration_event_uuid, metadata]
    rpc:
      - POST /api/gammavet/drivers/pause
